<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>二十四节令鼓 · 鼓阵编排</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500&display=swap');

  :root {
    --ink: #1a1208;
    --paper: #f7f3ec;
    --warm-mid: #e8dfc8;
    --drum-red: #c0392b;
    --drum-green: #27ae60;
    --drum-blue: #2980b9;
    --drum-black: #2c2c2c;
    --gold: #b8860b;
    --gold-light: #d4a017;
    --panel-bg: #faf7f0;
    --border: #c8b89a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--ink);
    color: var(--paper);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--gold);
  }
  header .title-block { display:flex; align-items:baseline; gap:12px; }
  header h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.5rem;
    font-weight: 900;
    letter-spacing: .12em;
    color: var(--gold-light);
  }
  header .sub { font-size: .78rem; color: #a09070; letter-spacing: .06em; }
  header .actions { display:flex; gap:10px; }

  .btn {
    padding: 7px 18px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: .82rem;
    font-weight: 500;
    transition: all .15s;
  }
  .btn-gold { background: var(--gold); color: #fff; }
  .btn-gold:hover { background: var(--gold-light); }
  .btn-outline {
    background: transparent;
    border: 1.5px solid #6a5a3a;
    color: #c8b07a;
  }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold-light); }
  .btn-danger {
    background: transparent;
    border: 1.5px solid #7a3a3a;
    color: #c08080;
  }
  .btn-danger:hover { background: #3a1a1a; color: #e09090; }

  .workspace { display: flex; flex: 1; overflow: hidden; }

  /* LEFT PANEL */
  .left-panel {
    width: 220px;
    min-width: 220px;
    background: var(--panel-bg);
    border-right: 1.5px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .panel-section {
    padding: 16px 14px 12px;
    border-bottom: 1px solid var(--warm-mid);
  }
  .panel-section h3 {
    font-family: 'Noto Serif SC', serif;
    font-size: .78rem;
    font-weight: 700;
    letter-spacing: .14em;
    color: var(--gold);
    margin-bottom: 12px;
  }
  .drum-palette { display: flex; flex-direction: column; gap: 6px; }
  .drum-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: all .15s;
    user-select: none;
  }
  .drum-item:hover { background: var(--warm-mid); border-color: var(--border); }
  .drum-item.active { border-color: var(--gold); background: #f0e8d0; }
  .drum-item .icon { width: 28px; height: 28px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .drum-item .icon svg { width:100%; height:100%; }
  .drum-item .label-row { display:flex; flex-direction:column; gap:2px; }
  .drum-item .name { font-size: .85rem; font-weight: 500; }
  .drum-item .rot-hint { font-size: .68rem; color: #9a8060; }

  /* rotation controls inside drum item */
  .drum-rot-controls {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 4px;
  }
  .rot-btn {
    width: 22px; height: 22px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: transparent;
    cursor: pointer;
    font-size: .75rem;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink);
    transition: all .12s;
    padding: 0;
  }
  .rot-btn:hover { background: var(--warm-mid); border-color: var(--gold); }
  .rot-display {
    font-size: .7rem;
    color: #7a6a4a;
    min-width: 32px;
    text-align: center;
  }

  /* saved list */
  .saved-list { display: flex; flex-direction: column; gap: 5px; }
  .saved-item { display: flex; align-items: center; gap: 6px; }
  .saved-item button.load {
    flex: 1;
    padding: 5px 8px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    font-size: .8rem;
    text-align: left;
    color: var(--ink);
    transition: all .15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .saved-item button.load:hover { background: var(--warm-mid); }
  .saved-item button.del {
    padding: 4px 7px;
    background: transparent;
    border: 1px solid #c8a0a0;
    border-radius: 4px;
    cursor: pointer;
    font-size: .75rem;
    color: #b06060;
    transition: all .15s;
    flex-shrink: 0;
  }
  .saved-item button.del:hover { background: #f0d8d8; }

  /* CANVAS AREA */
  .canvas-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .canvas-toolbar {
    background: var(--panel-bg);
    border-bottom: 1px solid var(--border);
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .canvas-toolbar label { font-size: .8rem; color: #7a6a4a; margin-right: 2px; }
  .canvas-toolbar input[type=text] {
    border: 1px solid var(--border);
    background: #fff;
    padding: 5px 10px;
    border-radius: 4px;
    font-size: .85rem;
    font-family: 'Noto Sans SC', sans-serif;
    width: 140px;
    color: var(--ink);
  }
  .sep { width: 1px; height: 22px; background: var(--border); }
  .mode-btn {
    padding: 5px 14px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    background: transparent;
    cursor: pointer;
    font-size: .8rem;
    font-family: 'Noto Sans SC', sans-serif;
    color: var(--ink);
    transition: all .15s;
  }
  .mode-btn.active { background: var(--gold); border-color: var(--gold); color: #fff; }
  .mode-btn:hover:not(.active) { background: var(--warm-mid); }

  /* rotate-selected button */
  .rot-sel-btn {
    padding: 5px 12px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    background: transparent;
    cursor: pointer;
    font-size: .8rem;
    font-family: 'Noto Sans SC', sans-serif;
    color: var(--ink);
    transition: all .15s;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .rot-sel-btn:hover { background: var(--warm-mid); border-color: var(--gold); }

  .size-controls { display:flex; align-items:center; gap:8px; }
  .size-controls input[type=number] {
    width: 62px;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 6px;
    font-size: .82rem;
    font-family: 'Noto Sans SC', sans-serif;
    color: var(--ink);
    background: #fff;
  }
  .size-controls span { font-size: .78rem; color: #7a6a4a; }
  .grid-toggle { display:flex; align-items:center; gap:6px; cursor:pointer; font-size:.82rem; }
  .grid-toggle input { cursor:pointer; accent-color: var(--gold); }

  /* CANVAS SCROLL */
  .canvas-scroll {
    flex: 1;
    overflow: auto;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 30px 24px;
    background: #ede8dc url("data:image/svg+xml,%3Csvg width='20' height='20' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='1' cy='1' r='.8' fill='%23c8b89a55'/%3E%3C/svg%3E");
  }

  #stage-wrapper { position: relative; display: inline-block; }
  .stage-label {
    position: absolute;
    top: -30px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Noto Serif SC', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: .1em;
    pointer-events: none;
    white-space: nowrap;
  }
  .audience-arrow { position: absolute; pointer-events: none; }

  #stage {
    position: relative;
    background: #fff;
    border: 3px solid var(--ink);
    cursor: crosshair;
    overflow: hidden;
  }
  #stage.mode-select { cursor: default; }
  #stage.mode-erase  { cursor: cell; }

  #center-line {
    position: absolute; top: 0; bottom: 0; left: 50%;
    width: 1px; background: rgba(44,44,44,.15); pointer-events: none;
  }
  #center-label {
    position: absolute; top: 6px; left: 50%;
    transform: translateX(-50%);
    font-size: .7rem; color: #4a90d9; pointer-events: none; letter-spacing: .06em;
  }
  #grid-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; opacity: 0; transition: opacity .2s;
  }
  #grid-overlay.visible { opacity: 1; }

  .drum-token {
    position: absolute;
    transform: translate(-50%, -50%);
    cursor: pointer;
    transition: filter .1s;
    user-select: none;
  }
  .drum-token:hover { filter: drop-shadow(0 0 5px rgba(184,134,11,.8)); }
  .drum-token.selected { filter: drop-shadow(0 0 7px rgba(184,134,11,1)); }
  .drum-token svg { display: block; }

  #sel-rect {
    position: absolute;
    border: 1.5px dashed var(--gold);
    background: rgba(184,134,11,.06);
    pointer-events: none;
    display: none;
  }

  /* RIGHT PANEL */
  .right-panel {
    width: 200px; min-width: 200px;
    background: var(--panel-bg);
    border-left: 1.5px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .legend { padding: 16px 14px; border-bottom: 1px solid var(--warm-mid); }
  .legend h3 { font-family:'Noto Serif SC',serif; font-size:.78rem; letter-spacing:.14em; color:var(--gold); margin-bottom:12px; }
  .legend-item { display:flex; align-items:center; gap:10px; margin-bottom:8px; font-size:.83rem; }
  .legend-item .icon { width:26px; height:26px; display:flex; align-items:center; justify-content:center; }

  .stats-panel { padding: 16px 14px; border-bottom: 1px solid var(--warm-mid); }
  .stats-panel h3 { font-family:'Noto Serif SC',serif; font-size:.78rem; letter-spacing:.14em; color:var(--gold); margin-bottom:10px; }
  .stat-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; font-size:.82rem; }
  .stat-row .dot { width:10px; height:10px; border-radius:50%; border:2px solid currentColor; margin-right:4px; display:inline-block; }
  .stat-label { display:flex; align-items:center; }
  .stat-count { font-weight:700; font-family:'Noto Serif SC',serif; font-size:.95rem; }

  .notes-panel { padding: 16px 14px; }
  .notes-panel h3 { font-family:'Noto Serif SC',serif; font-size:.78rem; letter-spacing:.14em; color:var(--gold); margin-bottom:8px; }
  .notes-panel textarea {
    width:100%; height:100px; border:1px solid var(--border); border-radius:4px;
    padding:8px; font-family:'Noto Sans SC',sans-serif; font-size:.8rem;
    resize:vertical; color:var(--ink); background:#fff;
  }

  #toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink); color: var(--gold-light);
    padding: 10px 22px; border-radius: 6px; font-size: .85rem;
    border: 1px solid var(--gold); transition: transform .3s;
    pointer-events: none; z-index: 999;
    font-family: 'Noto Serif SC', serif; letter-spacing: .06em;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(26,18,8,.55); z-index: 500;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--panel-bg); border: 2px solid var(--border);
    border-radius: 8px; padding: 28px 32px; min-width: 320px; max-width: 90vw;
  }
  .modal h2 { font-family:'Noto Serif SC',serif; font-size:1.1rem; color:var(--ink); margin-bottom:18px; }
  .modal label { font-size:.83rem; display:block; margin-bottom:5px; color:#5a4a2a; }
  .modal input {
    width:100%; border:1px solid var(--border); border-radius:4px;
    padding:7px 10px; font-size:.88rem; font-family:'Noto Sans SC',sans-serif;
    color:var(--ink); margin-bottom:16px; background:#fff;
  }
  .modal-actions { display:flex; gap:10px; justify-content:flex-end; }
</style>
</head>
<body>

<header>
  <div class="title-block">
    <h1>二十四节令鼓</h1>
    <span class="sub">鼓阵编排系统</span>
  </div>
  <div class="actions">
    <button class="btn btn-outline" onclick="openSaveModal()">💾 保存阵型</button>
    <button class="btn btn-outline" onclick="exportSVG()">📷 导出图片</button>
    <button class="btn btn-danger" onclick="clearStage()">✕ 清空</button>
  </div>
</header>

<div class="workspace">

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="panel-section">
      <h3>鼓 种</h3>
      <div class="drum-palette" id="drum-palette"></div>
    </div>
    <div class="panel-section" style="flex:1">
      <h3>已保存阵型</h3>
      <div class="saved-list" id="saved-list"></div>
    </div>
  </div>

  <!-- CANVAS AREA -->
  <div class="canvas-area">
    <div class="canvas-toolbar">
      <label>阵型名称：</label>
      <input type="text" id="formation-name" value="" placeholder="阵型名称" />
      <div class="sep"></div>
      <label>舞台：</label>
      <div class="size-controls">
        <input type="number" id="stage-w" value="800" min="400" max="1400" step="50" onchange="resizeStage()"/>
        <span>×</span>
        <input type="number" id="stage-h" value="500" min="300" max="900" step="50" onchange="resizeStage()"/>
        <span>px</span>
      </div>
      <div class="sep"></div>
      <button class="mode-btn active" id="btn-place" onclick="setMode('place')">放置</button>
      <button class="mode-btn" id="btn-select" onclick="setMode('select')">选择</button>
      <button class="mode-btn" id="btn-erase" onclick="setMode('erase')">删除</button>
      <div class="sep"></div>
      <button class="rot-sel-btn" onclick="rotateSelected()" title="将选中符号顺时针旋转45°">
        ↻ 旋转选中 +45°
      </button>
      <div class="sep"></div>
      <label class="grid-toggle">
        <input type="checkbox" id="grid-check" onchange="toggleGrid(this.checked)"/>
        网格对齐
      </label>
      <div class="sep"></div>
      <button class="btn btn-outline" style="padding:5px 12px;font-size:.78rem" onclick="undo()">↩ 撤销</button>
    </div>

    <div class="canvas-scroll">
      <div id="stage-wrapper">
        <div class="stage-label" id="stage-title"></div>
        <svg class="audience-arrow" style="top:-2px;left:-2px;width:38px;height:44px" viewBox="0 0 38 44">
          <path d="M19 42 L4 22 L12 22 L12 2 L26 2 L26 22 L34 22 Z" fill="none" stroke="#1a1208" stroke-width="2.5"/>
        </svg>
        <svg class="audience-arrow" style="top:-2px;right:-2px;width:38px;height:44px" viewBox="0 0 38 44">
          <path d="M19 42 L4 22 L12 22 L12 2 L26 2 L26 22 L34 22 Z" fill="none" stroke="#1a1208" stroke-width="2.5"/>
        </svg>
        <div id="stage">
          <div id="center-line"></div>
          <div id="center-label">Center</div>
          <canvas id="grid-overlay"></canvas>
          <div id="sel-rect"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="legend">
      <h3>图 例</h3>
      <div id="legend-items"></div>
    </div>
    <div class="stats-panel">
      <h3>统 计</h3>
      <div id="stats"></div>
      <div class="stat-row" style="margin-top:10px;border-top:1px solid var(--warm-mid);padding-top:8px">
        <span style="font-size:.82rem;color:#5a4a2a">合计</span>
        <span class="stat-count" id="total-count">0</span>
      </div>
    </div>
    <div class="notes-panel">
      <h3>备 注</h3>
      <textarea placeholder="记录编排说明、走位提示..."></textarea>
    </div>
  </div>
</div>

<!-- Save Modal -->
<div class="modal-overlay" id="save-modal">
  <div class="modal">
    <h2>保存阵型</h2>
    <label>阵型名称</label>
    <input type="text" id="save-name-input" />
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeSaveModal()">取消</button>
      <button class="btn btn-gold" onclick="confirmSave()">保存</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── DRUM TYPES ───────────────────────────────────────────────
const DRUM_TYPES = [
  {
    id: 'zuGu', name: '坐鼓', color: '#c0392b',
    svg: (s=32, rot=0) => `<svg width="${s}" height="${s}" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
      <circle cx="16" cy="16" r="12" fill="none" stroke="#c0392b" stroke-width="2.5" transform="rotate(${rot},16,16)"/>
    </svg>`
  },
  {
    id: 'ceGu', name: '侧鼓', color: '#27ae60',
    svg: (s=32, rot=0) => `<svg width="${s}" height="${s}" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
      <circle cx="16" cy="16" r="12" fill="none" stroke="#27ae60" stroke-width="2.5" transform="rotate(${rot},16,16)"/>
    </svg>`
  },
  {
    id: 'zhanGu', name: '战鼓', color: '#2980b9',
    svg: (s=32, rot=0) => `<svg width="${s}" height="${s}" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
      <circle cx="16" cy="16" r="12" fill="none" stroke="#2980b9" stroke-width="2.5" transform="rotate(${rot},16,16)"/>
    </svg>`
  },
  {
    id: 'pingGu', name: '平鼓', color: '#2c2c2c',
    svg: (s=32, rot=0) => `<svg width="${s}" height="${s}" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
      <circle cx="16" cy="16" r="12" fill="none" stroke="#2c2c2c" stroke-width="2.5" transform="rotate(${rot},16,16)"/>
    </svg>`
  },
  {
    id: 'guShou', name: '鼓手', color: '#2c2c2c',
    svg: (s=32, rot=0) => `<svg width="${s}" height="${s}" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
      <path d="M16 4 L28 26 L4 26 Z" fill="none" stroke="#2c2c2c" stroke-width="2.5" stroke-linejoin="round" transform="rotate(${rot},16,16)"/>
    </svg>`
  },
  {
    id: 'guanZhong', name: '观众', color: '#1a1208',
    svg: (s=32, rot=0) => `<svg width="${s}" height="${s}" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
      <path d="M16 30 L4 16 L10 16 L10 2 L22 2 L22 16 L28 16 Z" fill="none" stroke="#1a1208" stroke-width="2.5" stroke-linejoin="round" transform="rotate(${rot},16,16)"/>
    </svg>`
  },
];

const TYPE_MAP = {};
DRUM_TYPES.forEach(t => TYPE_MAP[t.id] = t);

// Per-type default rotation (in degrees, applied to newly placed tokens)
const typeRotations = {};
DRUM_TYPES.forEach(t => typeRotations[t.id] = 0);

// ─── STATE ────────────────────────────────────────────────────
let mode = 'place';
let selectedType = 'zuGu';
let tokens = [];        // {id, typeId, x, y, rot}
let history = [];
let selectedIds = new Set();
let gridEnabled = false;
let gridSize = 20;      // halved from 40
let nextId = 1;
let dragging = null;
let selBox = null;
let saves = [];
try { saves = JSON.parse(localStorage.getItem('drumSaves2') || '[]'); } catch(e){}

const stage = document.getElementById('stage');
const selRect = document.getElementById('sel-rect');

// ─── INIT ─────────────────────────────────────────────────────
function init() {
  buildPalette();
  buildLegend();
  resizeStage();
  renderSaved();
  updateStats();
  bindStageEvents();
}

function buildPalette() {
  const pal = document.getElementById('drum-palette');
  pal.innerHTML = '';
  DRUM_TYPES.forEach(t => {
    const div = document.createElement('div');
    div.className = 'drum-item' + (t.id === selectedType ? ' active' : '');
    div.dataset.id = t.id;
    div.innerHTML = `
      <div class="icon" id="pal-icon-${t.id}">${t.svg(26, typeRotations[t.id])}</div>
      <div class="label-row">
        <div class="name">${t.name}</div>
        <div class="drum-rot-controls">
          <button class="rot-btn" title="逆时针45°" onclick="rotateType('${t.id}',-45,event)">↺</button>
          <span class="rot-display" id="rot-disp-${t.id}">${typeRotations[t.id]}°</span>
          <button class="rot-btn" title="顺时针45°" onclick="rotateType('${t.id}',45,event)">↻</button>
        </div>
      </div>`;
    div.addEventListener('click', (e) => {
      // don't trigger if clicking rotation buttons
      if (e.target.classList.contains('rot-btn')) return;
      selectType(t.id);
    });
    pal.appendChild(div);
  });
}

function rotateType(typeId, delta, e) {
  if (e) e.stopPropagation();
  typeRotations[typeId] = ((typeRotations[typeId] + delta) % 360 + 360) % 360;
  // update palette icon
  const icon = document.getElementById('pal-icon-' + typeId);
  if (icon) icon.innerHTML = TYPE_MAP[typeId].svg(26, typeRotations[typeId]);
  const disp = document.getElementById('rot-disp-' + typeId);
  if (disp) disp.textContent = typeRotations[typeId] + '°';
}

function buildLegend() {
  const el = document.getElementById('legend-items');
  el.innerHTML = DRUM_TYPES.map(t => `
    <div class="legend-item">
      <div class="icon">${t.svg(24, 0)}</div>
      <span>${t.name}</span>
    </div>`).join('');
}

function selectType(id) {
  selectedType = id;
  document.querySelectorAll('.drum-item').forEach(d => {
    d.classList.toggle('active', d.dataset.id === id);
  });
  if (mode !== 'erase') setMode('place');
}

function setMode(m) {
  mode = m;
  stage.className = 'mode-' + m;
  ['place','select','erase'].forEach(x => {
    const b = document.getElementById('btn-' + x);
    if (b) b.classList.toggle('active', x === m);
  });
  if (m !== 'select') { selectedIds.clear(); renderTokens(); }
}

// ─── ROTATE SELECTED ──────────────────────────────────────────
function rotateSelected() {
  if (!selectedIds.size) {
    toast('请先选择符号（切换至"选择"模式框选）');
    return;
  }
  pushHistory();
  selectedIds.forEach(id => {
    const tok = tokens.find(t => t.id === id);
    if (tok) {
      tok.rot = ((tok.rot || 0) + 45) % 360;
      const el = document.getElementById('tok-' + tok.id);
      if (el) el.innerHTML = TYPE_MAP[tok.typeId].svg(30, tok.rot);
    }
  });
  toast('已旋转 +45°');
}

// ─── STAGE RESIZE ─────────────────────────────────────────────
function resizeStage() {
  const w = parseInt(document.getElementById('stage-w').value);
  const h = parseInt(document.getElementById('stage-h').value);
  stage.style.width = w + 'px';
  stage.style.height = h + 'px';
  const go = document.getElementById('grid-overlay');
  go.width = w; go.height = h;
  drawGrid();
}

function toggleGrid(v) {
  gridEnabled = v;
  const go = document.getElementById('grid-overlay');
  go.classList.toggle('visible', v);
  drawGrid();
}

function drawGrid() {
  const go = document.getElementById('grid-overlay');
  const ctx = go.getContext('2d');
  ctx.clearRect(0, 0, go.width, go.height);
  if (!gridEnabled) return;
  ctx.strokeStyle = 'rgba(184,134,11,.2)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= go.width; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, go.height); ctx.stroke();
  }
  for (let y = 0; y <= go.height; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(go.width, y); ctx.stroke();
  }
}

// ─── STAGE EVENTS ─────────────────────────────────────────────
function bindStageEvents() {
  stage.addEventListener('mousedown', onStageDown);
  stage.addEventListener('mousemove', onStageMove);
  stage.addEventListener('mouseup', onStageUp);
  stage.addEventListener('contextmenu', e => e.preventDefault());
}

function snapXY(x, y) {
  if (!gridEnabled) return {x, y};
  return {x: Math.round(x/gridSize)*gridSize, y: Math.round(y/gridSize)*gridSize};
}

function stagePos(e) {
  const r = stage.getBoundingClientRect();
  return {x: e.clientX - r.left, y: e.clientY - r.top};
}

function onStageDown(e) {
  if (e.button !== 0) return;
  const {x, y} = stagePos(e);
  if (mode === 'place') {
    const snapped = snapXY(x, y);
    pushHistory();
    addToken(selectedType, snapped.x, snapped.y, typeRotations[selectedType]);
  } else if (mode === 'select') {
    selBox = {sx: x, sy: y, ex: x, ey: y};
    selRect.style.display = 'block';
    updateSelRect();
  }
}

function onStageMove(e) {
  if (mode === 'select' && selBox) {
    const {x, y} = stagePos(e);
    selBox.ex = x; selBox.ey = y;
    updateSelRect();
  }
  if (dragging) {
    const {x, y} = stagePos(e);
    const raw = {x: x + dragging.ox, y: y + dragging.oy};
    const snapped = snapXY(raw.x, raw.y);
    const sw = parseInt(stage.style.width);
    const sh = parseInt(stage.style.height);
    const tok = tokens.find(t => t.id === dragging.id);
    if (tok) {
      tok.x = Math.max(5, Math.min(sw-5, snapped.x));
      tok.y = Math.max(5, Math.min(sh-5, snapped.y));
      const el = document.getElementById('tok-' + tok.id);
      if (el) { el.style.left = tok.x + 'px'; el.style.top = tok.y + 'px'; }
    }
  }
}

function onStageUp(e) {
  if (mode === 'select' && selBox) {
    const minX = Math.min(selBox.sx, selBox.ex);
    const maxX = Math.max(selBox.sx, selBox.ex);
    const minY = Math.min(selBox.sy, selBox.ey);
    const maxY = Math.max(selBox.sy, selBox.ey);
    if (maxX - minX < 5 && maxY - minY < 5) {
      selectedIds.clear();
    } else {
      selectedIds.clear();
      tokens.forEach(t => {
        if (t.x >= minX && t.x <= maxX && t.y >= minY && t.y <= maxY) selectedIds.add(t.id);
      });
    }
    selBox = null;
    selRect.style.display = 'none';
    renderTokens();
  }
  dragging = null;
}

function updateSelRect() {
  if (!selBox) return;
  const l = Math.min(selBox.sx, selBox.ex);
  const t = Math.min(selBox.sy, selBox.ey);
  const w = Math.abs(selBox.ex - selBox.sx);
  const h = Math.abs(selBox.ey - selBox.sy);
  selRect.style.left = l+'px'; selRect.style.top = t+'px';
  selRect.style.width = w+'px'; selRect.style.height = h+'px';
}

// ─── TOKEN MANAGEMENT ─────────────────────────────────────────
function addToken(typeId, x, y, rot=0) {
  const tok = {id: nextId++, typeId, x, y, rot};
  tokens.push(tok);
  renderToken(tok);
  updateStats();
}

function renderToken(tok) {
  const el = document.createElement('div');
  el.className = 'drum-token' + (selectedIds.has(tok.id) ? ' selected' : '');
  el.id = 'tok-' + tok.id;
  el.style.left = tok.x + 'px';
  el.style.top = tok.y + 'px';
  el.innerHTML = TYPE_MAP[tok.typeId].svg(30, tok.rot || 0);

  el.addEventListener('mousedown', ev => {
    ev.stopPropagation();
    if (mode === 'erase') {
      pushHistory();
      removeToken(tok.id);
      return;
    }
    if (mode === 'select') {
      if (!selectedIds.has(tok.id)) { selectedIds.clear(); selectedIds.add(tok.id); renderTokens(); }
      return;
    }
    if (mode === 'place') {
      const {x, y} = stagePos(ev);
      dragging = {id: tok.id, ox: tok.x - x, oy: tok.y - y};
      pushHistory();
    }
  });

  stage.appendChild(el);
}

function removeToken(id) {
  tokens = tokens.filter(t => t.id !== id);
  const el = document.getElementById('tok-' + id);
  if (el) el.remove();
  selectedIds.delete(id);
  updateStats();
}

function renderTokens() {
  stage.querySelectorAll('.drum-token').forEach(e => e.remove());
  tokens.forEach(tok => renderToken(tok));
}

function clearStage() {
  if (!confirm('确定清空当前阵型？')) return;
  pushHistory();
  tokens = [];
  stage.querySelectorAll('.drum-token').forEach(e => e.remove());
  updateStats();
}

// ─── STATS ────────────────────────────────────────────────────
function updateStats() {
  const counts = {};
  DRUM_TYPES.forEach(t => counts[t.id] = 0);
  tokens.forEach(t => counts[t.typeId]++);
  const el = document.getElementById('stats');
  el.innerHTML = DRUM_TYPES.map(t => `
    <div class="stat-row">
      <span class="stat-label">
        <span class="dot" style="color:${t.color};border-color:${t.color}"></span>${t.name}
      </span>
      <span class="stat-count" style="color:${t.color}">${counts[t.id]}</span>
    </div>`).join('');
  document.getElementById('total-count').textContent = tokens.length;
  const nm = document.getElementById('formation-name').value;
  document.getElementById('stage-title').textContent = nm;
}

document.getElementById('formation-name').addEventListener('input', updateStats);

// ─── HISTORY / UNDO ───────────────────────────────────────────
function pushHistory() {
  history.push(JSON.stringify(tokens.map(t => ({...t}))));
  if (history.length > 80) history.shift();
}

function undo() {
  if (!history.length) return;
  const prev = JSON.parse(history.pop());
  tokens = prev;
  if (tokens.length) nextId = Math.max(...tokens.map(t => t.id)) + 1;
  renderTokens();
  updateStats();
  toast('已撤销');
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
  if ((e.key === 'Delete' || e.key === 'Backspace') && selectedIds.size) {
    pushHistory();
    selectedIds.forEach(id => {
      tokens = tokens.filter(t => t.id !== id);
      const el = document.getElementById('tok-' + id);
      if (el) el.remove();
    });
    selectedIds.clear();
    updateStats();
  }
  // R key: rotate selected
  if (e.key === 'r' || e.key === 'R') { rotateSelected(); }
});

// ─── SAVE / LOAD ──────────────────────────────────────────────
function openSaveModal() {
  document.getElementById('save-name-input').value = document.getElementById('formation-name').value;
  document.getElementById('save-modal').classList.add('open');
  setTimeout(() => document.getElementById('save-name-input').focus(), 50);
}
function closeSaveModal() {
  document.getElementById('save-modal').classList.remove('open');
}
function confirmSave() {
  const name = document.getElementById('save-name-input').value.trim() || '未命名';
  const entry = {
    name,
    tokens: tokens.map(t => ({...t})),
    stageW: document.getElementById('stage-w').value,
    stageH: document.getElementById('stage-h').value,
    notes: document.querySelector('.notes-panel textarea').value,
    date: new Date().toLocaleDateString('zh-CN')
  };
  saves = saves.filter(s => s.name !== name);
  saves.unshift(entry);
  if (saves.length > 30) saves.pop();
  try { localStorage.setItem('drumSaves2', JSON.stringify(saves)); } catch(e){}
  closeSaveModal();
  renderSaved();
  toast('「' + name + '」已保存');
}

function loadSaved(name) {
  const entry = saves.find(s => s.name === name);
  if (!entry) return;
  pushHistory();
  tokens = entry.tokens.map(t => ({...t, rot: t.rot || 0}));
  if (entry.stageW) document.getElementById('stage-w').value = entry.stageW;
  if (entry.stageH) document.getElementById('stage-h').value = entry.stageH;
  if (entry.notes) document.querySelector('.notes-panel textarea').value = entry.notes;
  document.getElementById('formation-name').value = entry.name;
  if (tokens.length) nextId = Math.max(...tokens.map(t => t.id)) + 1;
  resizeStage();
  renderTokens();
  updateStats();
  toast('已加载「' + name + '」');
}

function deleteSaved(name) {
  if (!confirm('删除「' + name + '」？')) return;
  saves = saves.filter(s => s.name !== name);
  try { localStorage.setItem('drumSaves2', JSON.stringify(saves)); } catch(e){}
  renderSaved();
}

function renderSaved() {
  const el = document.getElementById('saved-list');
  if (!saves.length) {
    el.innerHTML = '<div style="font-size:.78rem;color:#a09070;padding:4px 2px">暂无保存记录<br>编排完成后点击「保存阵型」</div>';
    return;
  }
  el.innerHTML = saves.map(s => {
    const safeName = s.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<div class="saved-item">
      <button class="load" onclick="loadSaved('${safeName}')">📋 ${s.name}<br><span style="font-size:.68rem;color:#9a8060">${s.date||''}</span></button>
      <button class="del" onclick="deleteSaved('${safeName}')">×</button>
    </div>`;
  }).join('');
}

// ─── EXPORT SVG ───────────────────────────────────────────────
function exportSVG() {
  const stageEl = document.getElementById('stage');
  const W = parseInt(stageEl.style.width);
  const H = parseInt(stageEl.style.height);
  const title = document.getElementById('formation-name').value;
  const PAD = 60;

  let svgStr = `<svg width="${W+PAD*2}" height="${H+PAD*2+30}" viewBox="0 0 ${W+PAD*2} ${H+PAD*2+30}" xmlns="http://www.w3.org/2000/svg">
  <rect width="${W+PAD*2}" height="${H+PAD*2+30}" fill="#f7f3ec"/>
  <text x="${(W+PAD*2)/2}" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1208" font-family="serif">${title}</text>
  <rect x="${PAD}" y="${PAD}" width="${W}" height="${H}" fill="white" stroke="#1a1208" stroke-width="2.5"/>
  <line x1="${PAD+W/2}" y1="${PAD}" x2="${PAD+W/2}" y2="${PAD+H}" stroke="rgba(44,44,44,.15)" stroke-width="1"/>`;

  const COLORS = {zuGu:'#c0392b',ceGu:'#27ae60',zhanGu:'#2980b9',pingGu:'#2c2c2c',guShou:'#2c2c2c',guanZhong:'#1a1208'};

  tokens.forEach(tok => {
    const px = tok.x + PAD;
    const py = tok.y + PAD;
    const rot = tok.rot || 0;
    const color = COLORS[tok.typeId];
    const tr = `transform="rotate(${rot},${px},${py})"`;
    if (tok.typeId === 'guShou') {
      svgStr += `<path d="M${px} ${py-13} L${px+12} ${py+10} L${px-12} ${py+10} Z" fill="none" stroke="${color}" stroke-width="2.2" stroke-linejoin="round" ${tr}/>`;
    } else if (tok.typeId === 'guanZhong') {
      svgStr += `<path d="M${px} ${py+14} L${px-10} ${py+2} L${px-4} ${py+2} L${px-4} ${py-14} L${px+4} ${py-14} L${px+4} ${py+2} L${px+10} ${py+2} Z" fill="none" stroke="${color}" stroke-width="2.2" ${tr}/>`;
    } else {
      svgStr += `<circle cx="${px}" cy="${py}" r="13" fill="none" stroke="${color}" stroke-width="2.2" ${tr}/>`;
    }
  });

  // legend
  const ly = PAD + H + 20;
  DRUM_TYPES.forEach((t, i) => {
    const lx = PAD + i * 105;
    const color = COLORS[t.id];
    if (t.id === 'guShou') {
      svgStr += `<path d="M${lx+8} ${ly-7} L${lx+15} ${ly+6} L${lx+1} ${ly+6} Z" fill="none" stroke="${color}" stroke-width="1.8"/>`;
    } else {
      svgStr += `<circle cx="${lx+8}" cy="${ly}" r="7" fill="none" stroke="${color}" stroke-width="1.8"/>`;
    }
    svgStr += `<text x="${lx+20}" y="${ly+5}" font-size="11" fill="#1a1208" font-family="sans-serif">${t.name}</text>`;
  });

  svgStr += '</svg>';

  const blob = new Blob([svgStr], {type:'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = title + '.svg'; a.click();
  URL.revokeObjectURL(url);
  toast('已导出 SVG');
}

// ─── TOAST ────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2400);
}

// ─── BOOT ─────────────────────────────────────────────────────
init();
</script>
